# myapp-deployment.yaml
# Scenario: Service selector does not match Pod labels → no endpoints → service broken
# Agent fix: patch the Service selector to match the Pod labels

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
  labels:
    app: myapp-v2
    demo: kagent-cncf-singapore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-v2
  template:
    metadata:
      labels:
        app: myapp-v2        # ← correct label on pods
    spec:
      containers:
        - name: web
          image: nginx:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-svc
  namespace: default
  labels:
    demo: kagent-cncf-singapore
spec:
  selector:
    app: myapp               # ← WRONG — should be myapp-v2
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP