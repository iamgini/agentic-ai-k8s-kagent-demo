# k8s-troubleshooter Agent
# API: kagent.dev/v1alpha2
# Built-in K8s tools via RemoteMCPServer kagent-tool-server (installed by --profile demo)
# Ref: https://kagent.dev/docs/kagent/resources/api-ref

apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-troubleshooter
  namespace: kagent
spec:
  description: >
    A Kubernetes SRE agent that diagnoses pod and deployment failures
    using natural language.
  type: Declarative
  declarative:
    modelConfig: openai-model-config
    systemMessage: |
      You are a Kubernetes SRE agent helping platform engineers troubleshoot issues.

      # Instructions
      - When asked about a failing workload, always check events first, then describe the resource, then check logs if available
      - Explain what you found in plain English — avoid raw kubectl output dumps
      - State the root cause clearly and suggest a concrete fix
      - If you don't know, say so — do not guess
      - Be concise: one paragraph diagnosis, one paragraph fix

      # Response format
      Always structure your response as Markdown:
      **Root cause:** [what is wrong]
      **Evidence:** [what you found]
      **Fix:** [what to do]
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_get_events
            - k8s_describe_resource
            - k8s_get_pod_logs
            - k8s_get_available_api_resources